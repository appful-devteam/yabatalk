# yabatalk/.app-meta.yaml
# このアプリの機械可読マニフェスト。skill/agent はここを最初に読む。
# スキーマ仕様: docs/APP-LAYOUT-STANDARD.md / docs/schemas/app-meta.schema.json

# yaml-language-server: $schema=../docs/schemas/app-meta.schema.json

schemaVersion: 1

name: yabatalk
displayName: ハラスメントーク
kind: ios

xcode:
  # Xcode "Rename Project" wizard でプロジェクト + ターゲット + scheme は yabatalk 化済み。
  # ソースフォルダ (lovetalk/) と pbxproj 内の `path = lovetalk;` 参照はそのまま（リネームしても pbxproj
  # と整合する必要があるので低リスクな現状維持）。conventions.* は実フォルダ名に合わせて lovetalk/ で正本。
  project: yabatalk.xcodeproj
  workspace: null
  schemes:
    - yabatalk
  configurations: [Debug, Release]
  deploymentTarget: "26.0"
  supportedDestinations: [iPhone]
  defaultSimulator: "iPhone 17 Pro"

swift:
  version: "6.2"
  concurrencyMode: approachable
  packageManager: spm

identity:
  bundleIDs:
    main: appful.yabatalk
  marketingVersion: "1.0"
  buildNumber: "1"
  teamID: REPLACE_FROM_LOCAL_SETTINGS

stack:
  ui: swiftui
  state: observable
  navigation: navigationstack
  persistence:
    - swiftdata
  networking: urlsession
  dependency:
    manager: spm
    packages:
      - ZIPFoundation

extensions:
  appClip: false
  widget: false
  watchApp: false
  intents: false
  shareExtension: true
  notificationService: false

services:
  firebase: null
  cloudflare: null
  inAppPurchase:
    enabled: true
    # 自動更新サブスク 2 tier × 3 期間（StoreKit: lovetalk/Configuration.storekit / グループ "やばトーク Premium"）。
    # 価格は lovetalk 継承の暫定値 → AI 原価+インフラで要再検証。ASC 登録時に product ID をこの値で作成。
    type: autoRenewingSubscription
    subscriptionGroup: "やばトーク Premium"
    products:
      - id: yaba.weekly       # Premium 週額   ¥500
      - id: yaba.monthly      # Premium 月額   ¥980
      - id: yaba.yearly       # Premium 年額   ¥5,000
      - id: yaba.plus.weekly  # Premium+ 週額  ¥980
      - id: yaba.plus.monthly # Premium+ 月額  ¥1,980
      - id: yaba.plus.yearly  # Premium+ 年額  ¥12,800
  analytics: []
  crashReporting: null
  appStoreConnect:
    appleAppId: "6778561704"   # ハラスメントーク (App Store Connect)
    primaryLocale: ja

features:
  signInWithApple: false
  signInWithGoogle: false
  signInWithEmail: false
  healthKit: false
  mapKit: false
  push: false
  ar: false
  appClip: false
  widget: false
  inAppReviewPrompt: true   # skill: inapp-review-prompt（2段プロンプト）

# アプリ内評価（2段プロンプト）。初回診断完了→ホーム復帰で表示。
# トリガは ReviewManager.shouldShowPreReviewPrompt（count==1）、UI は InAppReviewPromptView。
review:
  triggerEvent: diagnosisCompleted
  triggerCount: 1
  feedbackChannel:
    type: mailto
    to: info@appful.tokyo
    subject: "【ハラスメントーク】フィードバック"
  feedbackCategories:
    - "診断結果が分かりにくい"
    - "バグや不具合"
    - "UI が分かりにくい"
    - "機能が足りない"
    - "動作が重い"
    - "その他"

conventions:
  views: lovetalk/Presentation/{feature}
  viewModels: lovetalk/Presentation/{feature}
  services: lovetalk/Data/Services
  models: lovetalk/Domain/Models
  designSystem: lovetalk/Core/Design
  resources: lovetalk/Resources
  tests: lovetalkTests
  uiTests: lovetalkUITests

testing:
  framework: swift-testing
  coverageThreshold: 80
  uiTestRunner: xcuitest

tooling:
  swiftformat:
    config: .swiftformat
  swiftlint:
    config: .swiftlint.yml
  xcconfig:
    debug: null
    release: null

ci:
  provider: none
  workflow: null
  fastlane: false

localization:
  default: ja
  supported: [ja, en-US]

secrets:
  keychainService: appful.yabatalk
  envVars: []

links:
  repository: https://github.com/appful-devteam/yabatalk
  designs: https://www.figma.com/design/YYHv0bHQOBMNC3vxgVjHOZ  # 診断結果リデザイン（4タブ現状の編集可能再現）
  appStore: null
  testflight: null
  productionMonitoring: null
